kind = "web"
previewPath = "/"
title = "DevSH Graphics Programming"
version = "1.0.0"
id = "artifacts/devsh-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24631

[services.development]
run = "pnpm --filter @workspace/devsh-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devsh-website", "run", "build" ]
publicDir = "artifacts/devsh-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24631"
BASE_PATH = "/"
